services:
  postgres:
    image: postgres:16-alpine
    container_name: travel_booking_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_password
      POSTGRES_DB: travel_booking_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_user -d travel_booking_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
